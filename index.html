<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 校园3D智能导览系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: rgba(20, 20, 35, 0.7);
            --border: rgba(255,255,255,0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99,102,241,0.5);
            --accent: #a855f7;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --radius: 20px;
            --glass: blur(24px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 粒子背景 */
        #particles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0;
            animation: floatUp 6s ease-in infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* 主容器 */
        .main-container {
            position: relative; z-index: 1;
            width: 1100px; max-width: 95%;
            margin: 30px auto;
            display: flex; gap: 24px;
            flex: 1;
        }

        /* 左侧数字人卡片 */
        .avatar-card {
            width: 380px; flex-shrink: 0;
            background: var(--card-bg);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            display: flex; flex-direction: column;
            align-items: center; gap: 20px;
            position: sticky; top: 30px;
            height: fit-content;
        }
        .avatar-ring {
            width: 200px; height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 4px;
            animation: ringPulse 3s ease-in-out infinite;
            box-shadow: 0 0 60px var(--primary-glow);
        }
        @keyframes ringPulse {
            0%,100% { box-shadow: 0 0 40px var(--primary-glow); }
            50% { box-shadow: 0 0 80px rgba(168,85,247,0.7); }
        }
        .avatar-inner {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #1a1a2e;
            display: flex; align-items: center;
            justify-content: center;
            font-size: 90px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .avatar-card h2 {
            font-size: 24px; font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-badge {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.3);
            font-size: 13px; color: #a5b4fc;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .model-switch {
            display: flex; gap: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px; padding: 4px;
        }
        .model-btn {
            padding: 8px 16px; border-radius: 10px;
            border: none; cursor: pointer;
            font-size: 13px; font-weight: 500;
            background: transparent; color: var(--text-secondary);
            transition: all 0.3s; font-family: inherit;
        }
        .model-btn.active {
            background: var(--primary); color: white;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* 右侧对话卡片 */
        .chat-card {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            display: flex; flex-direction: column;
            gap: 16px;
        }
        .chat-card .title {
            font-size: 28px; font-weight: 700;
            letter-spacing: -1px;
        }
        .chat-card .subtitle {
            font-size: 14px; color: var(--text-secondary);
            margin-top: -8px;
        }
        .chat-messages {
            flex: 1; overflow-y: auto;
            display: flex; flex-direction: column; gap: 16px;
            padding: 8px 0; min-height: 350px; max-height: 450px;
        }
        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .msg {
            display: flex; flex-direction: column;
            max-width: 80%;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user { align-self: flex-end; }
        .msg.assistant { align-self: flex-start; }
        .msg .label {
            font-size: 11px; font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px; padding: 0 4px;
        }
        .msg .bubble {
            padding: 12px 18px; border-radius: 18px;
            font-size: 14px; line-height: 1.6;
            word-break: break-word;
        }
        .msg.user .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.assistant .bubble {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }
        .input-row {
            display: flex; gap: 12px; align-items: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px 6px 6px 18px;
        }
        .input-row input {
            flex: 1; border: none; background: transparent;
            font-size: 15px; color: var(--text); outline: none;
            font-family: inherit;
        }
        .input-row input::placeholder { color: var(--text-secondary); }
        .send-btn {
            width: 46px; height: 46px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none; cursor: pointer; font-size: 18px;
            color: white; transition: all 0.3s;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.4; transform: none; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; padding: 16px 8px; }
            .avatar-card { width: 100%; position: static; flex-direction: row; flex-wrap: wrap; }
            .avatar-ring { width: 100px; height: 100px; }
            .avatar-inner { font-size: 50px; }
            .chat-messages { min-height: 250px; max-height: 350px; }
        }
    </style>
</head>
<body>

    <!-- 粒子背景 -->
    <div id="particles"></div>

    <!-- 主布局 -->
    <div class="main-container">
        <!-- 左侧数字人 -->
        <div class="avatar-card">
            <div class="avatar-ring">
                <div class="avatar-inner">🧑‍🏫</div>
            </div>
            <h2>虚拟导览员</h2>
            <div class="status-badge" id="statusBadge">
                <span class="status-dot"></span> 就绪
            </div>
            <div class="model-switch">
                <button class="model-btn active" data-model="deepseek-v4-flash" onclick="switchModel(this)">⚡ Flash</button>
                <button class="model-btn" data-model="deepseek-v4-pro" onclick="switchModel(this)">🧠 Pro</button>
            </div>
            <button class="model-btn" id="ttsBtn" style="width:100%;margin-top:4px;" onclick="toggleTTS()">🔊 语音开启</button>
        </div>

        <!-- 右侧对话 -->
        <div class="chat-card">
            <div class="title">🎓 校园智能导览系统</div>
            <div class="subtitle">基于 DeepSeek V4 · 纯本地知识库 · 安全可靠</div>
            <div class="chat-messages" id="chatMessages">
                <div class="msg assistant">
                    <span class="label">导览员</span>
                    <div class="bubble">👋 你好！我是校园智能导览员，请问有什么可以帮你的？</div>
                </div>
            </div>
            <div class="input-row">
                <input id="questionInput" placeholder="输入问题，如：图书馆几点开门？" onkeydown="if(event.key==='Enter')sendMessage()" />
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 粒子背景 ====================
        function createParticles() {
            const container = document.getElementById("particles");
            for (let i = 0; i < 40; i++) {
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random() * 100 + "%";
                p.style.width = p.style.height = Math.random() * 4 + 2 + "px";
                p.style.animationDelay = Math.random() * 6 + "s";
                p.style.animationDuration = Math.random() * 4 + 5 + "s";
                container.appendChild(p);
            }
        }
        createParticles();

        // ==================== API 配置 ====================
        const API_KEY = "你的API密钥"; // ← 替换为真实密钥
        const API_URL = "https://api.deepseek.com/chat/completions";
        let currentModel = "deepseek-v4-flash";
        let ttsEnabled = true;
        const synth = window.speechSynthesis;

        function switchModel(btn) {
            document.querySelectorAll(".model-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentModel = btn.dataset.model;
        }

        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            document.getElementById("ttsBtn").textContent = ttsEnabled ? "🔊 语音开启" : "🔇 语音关闭";
            if(!ttsEnabled) synth.cancel();
        }

        function speak(text) {
            if(!ttsEnabled) return;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "zh-CN"; u.rate = 1.05; u.volume = 0.9;
            synth.speak(u);
        }

        function addMsg(role, text) {
            const container = document.getElementById("chatMessages");
            const div = document.createElement("div");
            div.className = `msg ${role}`;
            div.innerHTML = `<span class="label">${role==="user"?"你":"导览员"}</span><div class="bubble">${escapeHTML(text)}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHTML(s) {
            const d = document.createElement("div"); d.textContent = s; return d.innerHTML;
        }

        function setStatus(text) {
            document.getElementById("statusBadge").innerHTML = `<span class="status-dot"></span> ${text}`;
        }

        function setLoading(v) {
            document.getElementById("sendBtn").disabled = v;
            document.getElementById("questionInput").disabled = v;
            setStatus(v ? "思考中..." : "就绪");
        }

        async function sendMessage() {
            const input = document.getElementById("questionInput");
            const q = input.value.trim();
            if(!q) return;
            addMsg("user", q); input.value = ""; setLoading(true);
            try {
                const r = await fetch(API_URL, {
                    method: "POST",
                    headers: {"Content-Type":"application/json","Authorization":`Bearer ${API_KEY}`},
                    body: JSON.stringify({
                        model: currentModel,
                        messages: [{role:"user",content:`你是校园智能导览员。只回答校园相关问题，否则说"抱歉，我只能回答校园相关问题"。回答简洁亲切，不超过3句话。\n问题：${q}`}],
                        temperature: 0.1, max_tokens: 200
                    })
                });
                const d = await r.json();
                const a = d.choices?.[0]?.message?.content || "服务暂不可用。";
                addMsg("assistant", a); speak(a);
            } catch(e) {
                addMsg("assistant", "网络连接失败，请稍后重试。");
            } finally { setLoading(false); }
        }

        // 欢迎语
        setTimeout(() => speak("你好！我是校园智能导览员，有什么可以帮你？"), 800);

        // 回车发送
        document.getElementById("questionInput").addEventListener("keydown", e => {
            if(e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
