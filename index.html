<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎓 校园3D智能导览</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-primary: #6750A4;
            --md-on-primary: #FFFFFF;
            --md-primary-container: #EADDFF;
            --md-on-primary-container: #21005D;
            --md-secondary-container: #E8DEF8;
            --md-on-secondary-container: #1D192B;
            --md-surface: #FEF7FF;
            --md-on-surface: #1C1B1F;
            --md-surface-variant: #E7E0EC;
            --md-on-surface-variant: #49454F;
            --md-outline: #79747E;
            --md-outline-variant: #CAC4D0;
            --md-error: #B3261E;
            --elevation-1: 0px 1px 2px rgba(0,0,0,0.3), 0px 1px 3px 1px rgba(0,0,0,0.15);
            --elevation-2: 0px 1px 2px rgba(0,0,0,0.3), 0px 2px 6px 2px rgba(0,0,0,0.15);
            --elevation-3: 0px 4px 8px 3px rgba(0,0,0,0.15), 0px 1px 3px rgba(0,0,0,0.3);
            --transition-speed: 0.3s;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            background: var(--md-surface);
            color: var(--md-on-surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ========== 顶部栏 ========== */
        .top-app-bar {
            background: var(--md-surface);
            padding: 0 16px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--elevation-1);
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(20px);
        }
        .top-app-bar h1 { font-size: 20px; font-weight: 500; flex: 1; }
        .top-app-bar .icon { font-size: 24px; }

        /* ========== 主布局 ========== */
        .main-layout {
            display: flex;
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 20px 16px;
            gap: 20px;
            transition: all var(--transition-speed);
        }

        /* ========== 左侧面板（桌面端） ========== */
        .avatar-panel {
            width: 340px;
            flex-shrink: 0;
            background: var(--md-surface-variant);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            box-shadow: var(--elevation-1);
            height: fit-content;
            position: sticky;
            top: 84px;
            transition: all var(--transition-speed);
        }
        .avatar-frame {
            width: 100%;
            aspect-ratio: 3/4;
            background: var(--md-primary-container);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--elevation-2);
        }
        .avatar-frame iframe { width: 100%; height: 100%; border: none; }
        .avatar-fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 100px;
            background: linear-gradient(135deg, var(--md-primary), #7D5260);
        }
        .avatar-panel h2 { font-size: 18px; font-weight: 500; color: var(--md-on-surface-variant); }
        .chip-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .chip {
            padding: 6px 14px; border-radius: 8px;
            border: 1px solid var(--md-outline);
            background: transparent; color: var(--md-on-surface-variant);
            font-size: 13px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; font-family: inherit;
        }
        .chip.active { background: var(--md-secondary-container); color: var(--md-on-secondary-container); border-color: transparent; }

        /* ========== 右侧对话区 ========== */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--md-surface);
            border-radius: 28px;
            padding: 20px;
            box-shadow: var(--elevation-1);
            min-width: 0;
            transition: all var(--transition-speed);
        }
        .model-select {
            width: 100%; padding: 12px 16px;
            border: 1px solid var(--md-outline); border-radius: 8px 8px 0 0;
            font-size: 14px; background: var(--md-surface-variant);
            color: var(--md-on-surface); outline: none; font-family: inherit;
        }
        .chat-history {
            flex: 1; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
            padding: 12px 0; min-height: 300px;
            scroll-behavior: smooth;
        }
        .chat-history::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-thumb { background: var(--md-outline-variant); border-radius: 4px; }
        .message { display: flex; flex-direction: column; max-width: 85%; animation: msgIn 0.3s ease-out; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.assistant { align-self: flex-start; align-items: flex-start; }
        .message .sender { font-size: 11px; font-weight: 500; color: var(--md-on-surface-variant); margin-bottom: 4px; }
        .message .bubble { padding: 10px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5; word-break: break-word; }
        .message.user .bubble { background: var(--md-primary); color: var(--md-on-primary); border-bottom-right-radius: 4px; }
        .message.assistant .bubble { background: var(--md-surface-variant); color: var(--md-on-surface-variant); border-bottom-left-radius: 4px; }

        .input-bar {
            display: flex; gap: 10px; align-items: center;
            background: var(--md-surface-variant); border-radius: 24px;
            padding: 4px 4px 4px 16px; box-shadow: var(--elevation-1);
        }
        .input-bar input {
            flex: 1; border: none; background: transparent;
            font-size: 15px; outline: none; color: var(--md-on-surface); font-family: inherit;
        }
        .fab {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--md-primary-container); color: var(--md-on-primary-container);
            border: none; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; box-shadow: var(--elevation-2); font-family: inherit;
        }
        .fab:hover { box-shadow: var(--elevation-3); background: var(--md-primary); color: var(--md-on-primary); }
        .fab:disabled { opacity: 0.5; }

        /* ========== 底部导航（移动端） ========== */
        .bottom-nav {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--md-surface); box-shadow: var(--elevation-2);
            padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
            z-index: 20;
        }
        .bottom-nav .nav-items { display: flex; justify-content: space-around; }
        .bottom-nav .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 6px 16px; border-radius: 16px; cursor: pointer;
            color: var(--md-on-surface-variant); font-size: 10px; font-weight: 500;
            transition: all 0.2s;
        }
        .bottom-nav .nav-item.active { background: var(--md-secondary-container); color: var(--md-on-secondary-container); }
        .bottom-nav .nav-item .nav-icon { font-size: 22px; }

        /* ========== 平板适配 ========== */
        @media (max-width: 1024px) and (min-width: 769px) {
            .main-layout { padding: 16px 12px; gap: 12px; }
            .avatar-panel { width: 280px; padding: 16px; }
            .avatar-panel h2 { font-size: 16px; }
            .chat-panel { padding: 16px; }
        }

        /* ========== 手机适配 ========== */
        @media (max-width: 768px) {
            .top-app-bar { height: 56px; padding: 0 12px; }
            .top-app-bar h1 { font-size: 17px; }
            .main-layout {
                flex-direction: column; padding: 12px 8px;
                padding-bottom: 80px; gap: 12px;
            }
            .avatar-panel {
                width: 100%; position: static;
                flex-direction: row; flex-wrap: wrap; justify-content: center;
                padding: 14px; gap: 10px; border-radius: 20px;
            }
            .avatar-frame { width: 100px; height: 130px; border-radius: 14px; }
            .avatar-panel h2 { font-size: 15px; }
            .avatar-panel p { display: none; }
            .chip-row { width: 100%; justify-content: center; }
            .chat-panel { border-radius: 20px; padding: 12px; }
            .chat-history { min-height: 250px; }
            .message { max-width: 90%; }
            .message .bubble { font-size: 13px; padding: 8px 14px; }
            .bottom-nav { display: block; }
            .input-bar { border-radius: 20px; }
            .fab { width: 40px; height: 40px; border-radius: 12px; }
        }

        /* ========== 暗色模式 ========== */
        @media (prefers-color-scheme: dark) {
            :root {
                --md-primary: #D0BCFF;
                --md-on-primary: #381E72;
                --md-primary-container: #4F378B;
                --md-on-primary-container: #EADDFF;
                --md-secondary-container: #4A4458;
                --md-on-secondary-container: #E8DEF8;
                --md-surface: #1C1B1F;
                --md-on-surface: #E6E1E5;
                --md-surface-variant: #2B2930;
                --md-on-surface-variant: #CAC4D0;
                --md-outline: #938F99;
                --md-outline-variant: #49454F;
                --md-error: #F2B8B5;
            }
            .fab { background: var(--md-primary-container); color: var(--md-on-primary-container); }
        }
    </style>
</head>
<body>
    <!-- 顶部栏 -->
    <header class="top-app-bar">
        <span class="icon">🎓</span>
        <h1>校园3D智能导览</h1>
    </header>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧：数字人 -->
        <aside class="avatar-panel">
            <div class="avatar-frame">
                <iframe id="avatarFrame" src="" allow="camera; microphone"></iframe>
                <div class="avatar-fallback" id="avatarFallback">🧑‍🏫</div>
            </div>
            <h2>虚拟导览员</h2>
            <p style="font-size:12px;opacity:0.7;">Material You</p>
            <div class="chip-row">
                <button class="chip active" id="ttsChip" onclick="toggleTTS()">🔊 语音</button>
                <button class="chip" onclick="changeAvatar()">🔄 换形象</button>
            </div>
        </aside>

        <!-- 右侧：对话 -->
        <main class="chat-panel">
            <select class="model-select" id="modelSelect">
                <option value="deepseek-v4-flash">⚡ V4 Flash</option>
                <option value="deepseek-v4-pro">🧠 V4 Pro</option>
            </select>
            <div class="chat-history" id="chatHistory">
                <div class="message assistant">
                    <span class="sender">导览员</span>
                    <div class="bubble">👋 你好！我是校园智能导览员，有什么可以帮你？</div>
                </div>
            </div>
            <div class="input-bar">
                <input id="questionInput" placeholder="输入问题…" onkeydown="if(event.key==='Enter')sendMessage()" />
                <button class="fab" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </main>
    </div>

    <!-- 底部导航（手机可见） -->
    <nav class="bottom-nav">
        <div class="nav-items">
            <div class="nav-item active" onclick="switchTab('chat')">
                <span class="nav-icon">💬</span>
                <span>对话</span>
            </div>
            <div class="nav-item" onclick="switchTab('avatar')">
                <span class="nav-icon">🤖</span>
                <span>数字人</span>
            </div>
            <div class="nav-item" onclick="switchTab('settings')">
                <span class="nav-icon">⚙️</span>
                <span>设置</span>
            </div>
        </div>
    </nav>

    <script>
        const API_KEY = "sk-faebb6bb24744fb3a3d2b8f68c942a7e"; // ← 替换
        const API_URL = "https://api.deepseek.com/chat/completions";
        let ttsEnabled = true;
        const synth = window.speechSynthesis;
        const avatars = ["64d8e1b6e5b2a8e3a1f4c5d7","64d8e2c4e5b2a8e3a1f4c5d8","64d8e3a1e5b2a8e3a1f4c5d9"];
        let avatarIdx = 0;

        // 初始化
        function init() { loadAvatar(); setTimeout(() => speak("你好，我是校园导览员，请问有什么可以帮你？"), 600); }
        function loadAvatar() {
            const f = document.getElementById("avatarFrame"), fb = document.getElementById("avatarFallback");
            f.src = `https://demo.readyplayer.me/avatar?id=${avatars[avatarIdx]}&frame=true`;
            f.style.display = "block"; fb.style.display = "none";
            f.onerror = () => { f.style.display = "none"; fb.style.display = "flex"; };
        }
        function changeAvatar() { avatarIdx = (avatarIdx + 1) % avatars.length; loadAvatar(); }

        // TTS
        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            const c = document.getElementById("ttsChip");
            c.textContent = ttsEnabled ? "🔊 语音" : "🔇 静音";
            c.classList.toggle("active", ttsEnabled);
            if(!ttsEnabled) synth.cancel();
        }
        function speak(t) {
            if(!ttsEnabled) return; synth.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = "zh-CN"; u.rate = 1.05; u.volume = 0.9; synth.speak(u);
        }

        // 消息
        function addMsg(role, t) {
            const h = document.getElementById("chatHistory");
            const d = document.createElement("div");
            d.className = `message ${role}`;
            d.innerHTML = `<span class="sender">${role==="user"?"你":"导览员"}</span><div class="bubble">${escapeHTML(t)}</div>`;
            h.appendChild(d); h.scrollTop = h.scrollHeight;
        }
        function escapeHTML(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
        function loading(v) {
            const b = document.getElementById("sendBtn"), i = document.getElementById("questionInput");
            b.disabled = v; i.disabled = v;
        }

        // 核心问答
        async function sendMessage() {
            const i = document.getElementById("questionInput"), q = i.value.trim();
            if(!q) return;
            const m = document.getElementById("modelSelect").value;
            addMsg("user", q); i.value = ""; loading(true);
            try {
                const r = await fetch(API_URL, {
                    method:"POST",
                    headers:{"Content-Type":"application/json","Authorization":`Bearer ${API_KEY}`},
                    body:JSON.stringify({ model:m, messages:[{role:"user",content:`你是校园导览员，只答校园问题，简洁亲切不超3句。问题：${q}`}], temperature:0.1, max_tokens:200 })
                });
                const d = await r.json();
                const a = d.choices?.[0]?.message?.content || "服务暂不可用。";
                addMsg("assistant", a); speak(a);
            } catch(e) { addMsg("assistant","网络连接失败，请稍后重试。"); }
            finally { loading(false); }
        }

        // 移动端标签切换
        function switchTab(tab) {
            const items = document.querySelectorAll(".nav-item");
            items.forEach(i => i.classList.remove("active"));
            if(tab === "chat") items[0].classList.add("active");
            if(tab === "avatar") items[1].classList.add("active");
            if(tab === "settings") items[2].classList.add("active");
        }

        init();
    </script>
</body>
</html>
