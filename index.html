<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎓 校园3D智能导览</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-primary: #6750A4;
            --md-on-primary: #FFFFFF;
            --md-primary-container: #EADDFF;
            --md-on-primary-container: #21005D;
            --md-secondary-container: #E8DEF8;
            --md-on-secondary-container: #1D192B;
            --md-surface: #FEF7FF;
            --md-on-surface: #1C1B1F;
            --md-surface-variant: #E7E0EC;
            --md-on-surface-variant: #49454F;
            --md-outline: #79747E;
            --elevation-1: 0px 1px 2px rgba(0,0,0,0.3), 0px 1px 3px 1px rgba(0,0,0,0.15);
            --elevation-2: 0px 1px 2px rgba(0,0,0,0.3), 0px 2px 6px 2px rgba(0,0,0,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            background: var(--md-surface);
            color: var(--md-on-surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        。top-app-bar {
            background: var(--md-surface);
            padding: 0 16px; height: 64px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: var(--elevation-1);
            position: sticky; top: 0; z-index: 20;
        }
        。top-app-bar h1 { font-size: 20px; font-weight: 500; flex: 1; }

        。main-layout {
            display: flex; flex: 1;
            max-width: 1400px; margin: 0 auto; width: 100%;
            padding: 20px 16px; gap: 20px;
        }

        。avatar-panel {
            width: 340px; flex-shrink: 0;
            background: var(--md-surface-variant);
            border-radius: 28px; padding: 24px;
            display: flex; flex-direction: column; align-items: center; gap: 16px;
            box-shadow: var(--elevation-1);
            height: fit-content; position: sticky; top: 84px;
        }
        。avatar-frame {
            width: 100%; aspect-ratio: 3/4;
            border-radius: 20px; overflow: hidden;
            box-shadow: var(--elevation-2);
        }
        。avatar-panel h2 { font-size: 18px; font-weight: 500; color: var(--md-on-surface-variant); }
        。chip-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        。chip {
            padding: 6px 14px; border-radius: 8px;
            border: 1px solid var(--md-outline);
            background: transparent; color: var(--md-on-surface-variant);
            font-size: 13px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; font-family: inherit;
        }
        。chip.active { background: var(--md-secondary-container); color: var(--md-on-secondary-container); border-color: transparent; }

        。chat-panel {
            flex: 1; display: flex; flex-direction: column;
            background: var(--md-surface); border-radius: 28px;
            padding: 20px; box-shadow: var(--elevation-1); min-width: 0;
        }
        .model-select {
            width: 100%; padding: 12px 16px;
            border: 1px solid var(--md-outline); border-radius: 8px 8px 0 0;
            font-size: 14px; background: var(--md-surface-variant);
            color: var(--md-on-surface); outline: none; font-family: inherit;
        }
        .chat-history {
            flex: 1; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
            padding: 12px 0; min-height: 300px;
        }
        .chat-history::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .message { display: flex; flex-direction: column; max-width: 85%; animation: msgIn 0.3s ease-out; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.assistant { align-self: flex-start; align-items: flex-start; }
        .message .sender { font-size: 11px; font-weight: 500; color: var(--md-on-surface-variant); margin-bottom: 4px; }
        .message .bubble { padding: 10px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5; word-break: break-word; }
        .message.user .bubble { background: var(--md-primary); color: var(--md-on-primary); border-bottom-right-radius: 4px; }
        .message.assistant .bubble { background: var(--md-surface-variant); color: var(--md-on-surface-variant); border-bottom-left-radius: 4px; }

        .input-bar {
            display: flex; gap: 10px; align-items: center;
            background: var(--md-surface-variant); border-radius: 24px;
            padding: 4px 4px 4px 16px; box-shadow: var(--elevation-1);
        }
        。input-bar input {
            flex: 1; border: none; background: transparent;
            font-size: 15px; outline: none; color: var(--md-on-surface); font-family: inherit;
        }
        .fab {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--md-primary-container); color: var(--md-on-primary-container);
            border: none; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; box-shadow: var(--elevation-2); font-family: inherit;
        }
        .fab:hover { background: var(--md-primary); color: var(--md-on-primary); }
        .fab:disabled { opacity: 0.5; }

        /* CSS 数字人动画 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }
        @keyframes thinkingPulse {
            0%， 100% { background: #4caf50; }
            50% { background: #ff9800; }
        }
        @keyframes dots {
            0%, 20% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        .status-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #4caf50;
            transition: background 0.3s;
        }
        .status-dot.thinking { animation: thinkingPulse 1s infinite; }
        .dots span {
            display: inline-block;
            animation: dots 1.2s infinite;
            font-size: 20px;
            line-height: 1;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; padding: 12px 8px 80px; }
            .avatar-panel { width: 100%; position: static; flex-direction: row; flex-wrap: wrap; padding: 14px; }
            .avatar-frame { width: 100px; height: 130px; border-radius: 14px; }
            .chat-panel { border-radius: 20px; padding: 12px; }
            .message { max-width: 90%; }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --md-primary: #D0BCFF;
                --md-on-primary: #381E72;
                --md-primary-container: #4F378B;
                --md-on-primary-container: #EADDFF;
                --md-secondary-container: #4A4458;
                --md-on-secondary-container: #E8DEF8;
                --md-surface: #1C1B1F;
                --md-on-surface: #E6E1E5;
                --md-surface-variant: #2B2930;
                --md-on-surface-variant: #CAC4D0;
                --md-outline: #938F99;
            }
        }
    </style>
</head>
<body>
    <header class="top-app-bar">
        <span style="font-size:24px;">🎓</span>
        <h1>校园3D智能导览</h1>
    </header>

    <div class="main-layout">
        <!-- 左侧：纯 CSS 动画数字人 -->
        <aside class="avatar-panel">
            <div class="avatar-frame" style="
                background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
                display: flex; align-items: center; justify-content: center;
                flex-direction: column; gap: 12px;
            ">
                <div style="
                    width: 120px; height: 120px;
                    background: rgba(255,255,255,0.95);
                    border-radius: 50%;
                    display: flex; align-items: center; justify-content: center;
                    font-size: 70px;
                    animation: float 3s ease-in-out infinite;
                    box-shadow: 0 10px 35px rgba(0,0,0,0.25);
                    position: relative;
                ">
                    🧑‍🏫
                    <div class="status-dot" id="statusDot" style="
                        position: absolute; bottom: 6px; right: 6px;
                    "></div>
                </div>
                <div style="color: white; font-size: 14px; font-weight: 500;" id="statusText">
                    正在聆听...
                </div>
                <div class="dots" id="thinkingDots" style="color: white; display: none;">
                    <span>●</span><span>●</span><span>●</span>
                </div>
            </div>
            <h2>虚拟导览员</h2>
            <p style="font-size:12px;opacity:0.7;">Material You Design</p>
            <div class="chip-row">
                <button class="chip active" id="ttsChip" onclick="toggleTTS()">🔊 语音</button>
            </div>
        </aside>

        <!-- 右侧：对话区 -->
        <main class="chat-panel">
            <select class="model-select" id="modelSelect">
                <option value="deepseek-v4-flash">⚡ V4 Flash</option>
                <option value="deepseek-v4-pro">🧠 V4 Pro</option>
            </select>
            <div class="chat-history" id="chatHistory">
                <div class="message assistant">
                    <span class="sender">导览员</span>
                    <div class="bubble">👋 你好！我是校园智能导览员，有什么可以帮你？</div>
                </div>
            </div>
            <div class="input-bar">
                <input id="questionInput" placeholder="输入问题…" onkeydown="if(event.key==='Enter')sendMessage()" />
                <button class="fab" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </main>
    </div>

    <script>
        const API_KEY = "sk-faebb6bb24744fb3a3d2b8f68c942a7e"; // ← 替换为你的真实密钥
        const API_URL = "https://api.deepseek.com/chat/completions";
        let ttsEnabled = true;
        const synth = window.speechSynthesis;

        function init() {
            setTimeout(() => speak("你好！我是校园智能导览员，有什么可以帮你？"), 500);
        }

        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            const c = document.getElementById("ttsChip");
            c.textContent = ttsEnabled ? "🔊 语音" : "🔇 静音";
            c.classList.toggle("active", ttsEnabled);
            if(!ttsEnabled) synth.cancel();
        }

        function speak(t) {
            if(!ttsEnabled) return;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = "zh-CN"; u.rate = 1.05; u.volume = 0.9;
            synth.speak(u);
        }

        function addMsg(role, t) {
            const h = document.getElementById("chatHistory");
            const d = document.createElement("div");
            d.className = `message ${role}`;
            d.innerHTML = `<span class="sender">${role==="user"?"你":"导览员"}</span><div class="bubble">${escapeHTML(t)}</div>`;
            h.appendChild(d); h.scrollTop = h.scrollHeight;
        }

        function escapeHTML(s) {
            const d = document.createElement("div"); d.textContent = s; return d.innerHTML;
        }

        function setStatus(state) {
            const dot = document.getElementById("statusDot");
            const text = document.getElementById("statusText");
            const dots = document.getElementById("thinkingDots");
            dot.classList.remove("thinking");
            dots.style.display = "none";
            if(state === "thinking") {
                text.textContent = "正在思考...";
                dot.classList.add("thinking");
                dots.style.display = "block";
            } else {
                text.textContent = "正在聆听...";
            }
        }

        function loading(v) {
            document.getElementById("sendBtn").disabled = v;
            document.getElementById("questionInput").disabled = v;
            setStatus(v ? "thinking" : "idle");
        }

        async function sendMessage() {
            const i = document.getElementById("questionInput"), q = i.value.trim();
            if(!q) return;
            const m = document.getElementById("modelSelect").value;
            addMsg("user", q); i.value = ""; loading(true);
            try {
                const r = await fetch(API_URL, {
                    method:"POST",
                    headers:{"Content-Type":"application/json","Authorization":`Bearer ${API_KEY}`},
                    body:JSON.stringify({
                        model:m,
                        messages:[{role:"user",content:`你是校园导览员，只答校园问题，简洁亲切不超3句话。问题：${q}`}],
                        temperature:0.1, max_tokens:200
                    })
                });
                const d = await r.json();
                const a = d.choices?.[0]?.message?.content || "服务暂不可用。";
                addMsg("assistant", a); speak(a);
            } catch(e) {
                addMsg("assistant","网络连接失败，请稍后重试。");
            } finally { loading(false); }
        }

        init();
    </script>
</body>
</html>
